<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Mining Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .value { font-size: 2.8rem; line-height: 1; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4">

  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold text-orange-500 mb-8 flex items-center gap-3">
      <i class="fa-solid fa-pickaxe"></i>
      Ocean Mining Live Monitor
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="cards"></div>

    <div class="mt-10 text-center text-zinc-500 text-sm">
      Auto-refresh every 30 seconds • Watch 60s and 10min closely for early warnings
    </div>
  </div>

  <script>
    // === CONFIGURATION (prompted on first load) ===
    let BOT_TOKEN = localStorage.getItem("botToken") || "";
    let CHAT_ID = localStorage.getItem("chatId") || "";

    if (!BOT_TOKEN || !CHAT_ID) {
      BOT_TOKEN = prompt("Enter your Telegram Bot Token:", BOT_TOKEN);
      CHAT_ID = prompt("Enter your Chat ID (or group chat ID):", CHAT_ID);
      
      if (BOT_TOKEN) localStorage.setItem("botToken", BOT_TOKEN);
      if (CHAT_ID) localStorage.setItem("chatId", CHAT_ID);
    }

    const miners = [
      { label: "KS1",      address: "bc1q3fkds9hfv6dufv9l8grkyg3ah77q3fjtpqywqg" },
      { label: "ICC",      address: "bc1qejpk6styu8k0wfnhg0veggjzzxwqkc9tew4y7h" },
      { label: "Erickson", address: "bc1qw5dv3cm0xctq4akqe5jxdr9rxz0dpzy7ylvqfd" },
      { label: "Hegarty",  address: "bc1qkd9x7598wnca9xudyzr3v3ksvddnqg8tflwv5z" }
    ];

    async function fetchHashrate(addr) {
      try {
        const res = await fetch(`https://api.ocean.xyz/v1/user_hashrate/${addr}`);
        const data = await res.json();
        const r = data.result || data;
        return {
          hashrate_60s: Number(r.hashrate_60s) || 0,
          hashrate_600s: Number(r.hashrate_600s) || 0,
          hashrate_10800s: Number(r.hashrate_10800s) || 0,
          hashrate_86400s: Number(r.hashrate_86400s) || 0,
        };
      } catch (e) {
        return { hashrate_60s: 0, hashrate_600s: 0, hashrate_10800s: 0, hashrate_86400s: 0 };
      }
    }

    function formatHR(value) {
      if (value >= 1e15) return (value / 1e15).toFixed(2) + " PH/s";
      if (value >= 1e12) return (value / 1e12).toFixed(2) + " TH/s";
      return (value / 1e9).toFixed(0) + " GH/s";
    }

    function getStatus(current60, avg3h) {
      if (avg3h === 0) return { color: "red", label: "CRITICAL" };
      const ratio = current60 / avg3h;
      if (ratio < 0.80) return { color: "red", label: "CRITICAL" };
      if (ratio < 0.90) return { color: "yellow", label: "WARNING" };
      return { color: "green", label: "HEALTHY" };
    }

    async function updateDashboard() {
      const container = document.getElementById("cards");
      container.innerHTML = "";

      for (let miner of miners) {
        const data = await fetchHashrate(miner.address);
        const status = getStatus(data.hashrate_60s, data.hashrate_10800s);

        const html = `
          <div class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6">
            <div class="flex justify-between items-start mb-6">
              <div class="text-2xl font-semibold">${miner.label}</div>
              <span class="px-4 py-1 text-xs font-bold rounded-full ${status.color === 'red' ? 'bg-red-600 text-white' : status.color === 'yellow' ? 'bg-yellow-500 text-black' : 'bg-green-600 text-white'}">
                ${status.label}
              </span>
            </div>

            <div class="space-y-8">
              <div>
                <div class="text-zinc-400 text-sm tracking-widest">60 SECOND</div>
                <div class="value text-5xl font-bold font-mono text-orange-400">${formatHR(data.hashrate_60s)}</div>
              </div>

              <div>
                <div class="text-zinc-400 text-sm tracking-widest">10 MINUTE</div>
                <div class="value text-4xl font-bold font-mono">${formatHR(data.hashrate_600s)}</div>
              </div>

              <div>
                <div class="text-zinc-400 text-sm tracking-widest">24 HOUR</div>
                <div class="value text-4xl font-bold font-mono">${formatHR(data.hashrate_86400s)}</div>
              </div>
            </div>

            <div class="mt-8 pt-4 border-t border-zinc-700 text-xs text-zinc-500">
              3h avg: ${formatHR(data.hashrate_10800s)}
            </div>

            <button onclick="sendTestMessage()" 
                    class="mt-8 w-full bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl text-sm font-medium">
              Send Test Telegram
            </button>
          </div>
        `;
        container.innerHTML += html;
      }
    }

    async function sendTestMessage() {
      if (!BOT_TOKEN || !CHAT_ID) {
        BOT_TOKEN = prompt("Enter your Telegram Bot Token:");
        CHAT_ID = prompt("Enter your Chat ID:");
        if (BOT_TOKEN) localStorage.setItem("botToken", BOT_TOKEN);
        if (CHAT_ID) localStorage.setItem("chatId", CHAT_ID);
      }

      const msg = `🔍 Ocean Mining Test\n${new Date().toLocaleTimeString()}\nDashboard is live.`;
      
      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
      });

      alert("✅ Test message sent to Telegram!");
    }

    // Auto refresh every 30 seconds
    setInterval(updateDashboard, 30000);
    updateDashboard();
  </script>
</body>
</html>
